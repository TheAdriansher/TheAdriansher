<svg width="100%" viewBox="0 0 680 520" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Home SOC Lab Architecture</title>
  <desc>Home SOC Lab: Kali Linux attacker, victim machines with Wazuh agents, Ubuntu Server with Wazuh SIEM, and detection pipeline.</desc>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      @keyframes pulse  { 0%,100%{opacity:1}  50%{opacity:0.3} }
      @keyframes flow   { to { stroke-dashoffset: -24; } }
      @keyframes glow   { 0%,100%{opacity:0.12} 50%{opacity:0.28} }
      @keyframes fadein { from{opacity:0} to{opacity:1} }

      .d1 { animation: fadein 0.5s ease both 0.1s; }
      .d2 { animation: fadein 0.5s ease both 0.3s; }
      .d3 { animation: fadein 0.5s ease both 0.5s; }
      .d4 { animation: fadein 0.5s ease both 0.7s; }
      .d5 { animation: fadein 0.5s ease both 0.9s; }

      .dot  { animation: pulse 2s ease-in-out infinite; }
      .dot2 { animation: pulse 2s ease-in-out infinite 0.65s; }
      .dot3 { animation: pulse 2s ease-in-out infinite 1.3s; }
      .fl   { stroke-dasharray:6 4; animation: flow 1.4s linear infinite; }
      .fls  { stroke-dasharray:6 4; animation: flow 2.2s linear infinite; }
      .glow { animation: glow 3s ease-in-out infinite; }

      text { font-family: 'JetBrains Mono','Fira Mono','Courier New',monospace; }
      .lm  { font-size:13px; font-weight:600; fill:#e2e8f0; }
      .ls  { font-size:10px; font-weight:400; fill:#94a3b8; }
      .lt  { font-size: 9px; font-weight:400; fill:#64748b; }
      .lb  { font-size: 9px; font-weight:600; }
      .st  { font-size:10px; font-weight:600; letter-spacing:1.5px; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="680" height="520" fill="#0d1117" rx="12"/>

  <!-- Grid -->
  <g opacity="0.035" stroke="#94a3b8" stroke-width="0.5">
    <line x1="85"  y1="0" x2="85"  y2="520"/>
    <line x1="170" y1="0" x2="170" y2="520"/>
    <line x1="255" y1="0" x2="255" y2="520"/>
    <line x1="340" y1="0" x2="340" y2="520"/>
    <line x1="425" y1="0" x2="425" y2="520"/>
    <line x1="510" y1="0" x2="510" y2="520"/>
    <line x1="595" y1="0" x2="595" y2="520"/>
    <line x1="0" y1="65"  x2="680" y2="65"/>
    <line x1="0" y1="130" x2="680" y2="130"/>
    <line x1="0" y1="195" x2="680" y2="195"/>
    <line x1="0" y1="260" x2="680" y2="260"/>
    <line x1="0" y1="325" x2="680" y2="325"/>
    <line x1="0" y1="390" x2="680" y2="390"/>
    <line x1="0" y1="455" x2="680" y2="455"/>
  </g>

  <!-- Outer boundary -->
  <rect class="d1" x="16" y="16" width="648" height="490" rx="10" fill="none" stroke="#1e2d3d" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text class="st d1" x="30" y="32" fill="#334155">HOME LAB NETWORK · 192.168.1.0/24</text>

  <!-- ══ ATTACKER ZONE ══ -->
  <rect class="d1" x="30" y="44" width="174" height="210" rx="8" fill="#130a0a" stroke="#7f1d1d" stroke-width="0.8"/>
  <text class="st d1" x="42" y="60" fill="#991b1b">ATTACKER</text>

  <rect class="d2" x="42" y="68" width="150" height="84" rx="6" fill="#1c0f0f" stroke="#dc2626" stroke-width="0.8"/>
  <rect class="glow d2" x="42" y="68" width="150" height="84" rx="6" fill="#dc2626"/>
  <circle class="dot"  cx="58" cy="84" r="3.5" fill="#ef4444"/>
  <circle class="dot2" cx="71" cy="84" r="3.5" fill="#f87171"/>
  <circle class="dot3" cx="84" cy="84" r="3.5" fill="#fca5a5"/>
  <text class="lm d2" x="58" y="108">Kali Linux</text>
  <text class="ls d2" x="58" y="122">hostname: snoopy</text>
  <text class="ls d2" x="58" y="136">192.168.1.10</text>

  <text class="lt d3" x="42" y="172">nmap · hydra · metasploit</text>
  <text class="lt d3" x="42" y="186">burpsuite · john · gobuster</text>
  <text class="lt d3" x="42" y="200">mimikatz · responder</text>
  <text class="lt d3" x="42" y="218">TTPs → MITRE ATT&amp;CK</text>
  <text class="lt d3" x="42" y="232">T1110 · T1059 · T1071</text>

  <!-- ══ VICTIM ZONE ══ -->
  <rect class="d1" x="222" y="44" width="232" height="210" rx="8" fill="#080f1a" stroke="#1e3a5f" stroke-width="0.8"/>
  <text class="st d1" x="234" y="60" fill="#1d4ed8">VICTIM MACHINES</text>

  <!-- Windows -->
  <rect class="d2" x="234" y="68" width="98" height="84" rx="6" fill="#0a1220" stroke="#2563eb" stroke-width="0.8"/>
  <circle class="dot"  cx="250" cy="84" r="3.5" fill="#3b82f6"/>
  <circle class="dot2" cx="263" cy="84" r="3.5" fill="#60a5fa"/>
  <text class="lm d2" x="250" y="110">Windows</text>
  <text class="ls d2" x="250" y="124">10 Eval</text>
  <text class="ls d2" x="250" y="138">.1.20</text>

  <!-- Linux -->
  <rect class="d2" x="342" y="68" width="98" height="84" rx="6" fill="#0a1220" stroke="#2563eb" stroke-width="0.8"/>
  <circle class="dot"  cx="358" cy="84" r="3.5" fill="#3b82f6"/>
  <circle class="dot2" cx="371" cy="84" r="3.5" fill="#60a5fa"/>
  <text class="lm d2" x="358" y="110">Ubuntu</text>
  <text class="ls d2" x="358" y="124">Desktop</text>
  <text class="ls d2" x="358" y="138">.1.30</text>

  <!-- Agent badges -->
  <text class="lt d3" x="234" y="172">Wazuh Agent instalado</text>
  <rect class="d3" x="234" y="178" width="98" height="14" rx="3" fill="#0c4a6e" stroke="#0284c7" stroke-width="0.5"/>
  <text class="lb d3" x="283" y="188" text-anchor="middle" fill="#7dd3fc">agent · active</text>
  <rect class="d3" x="342" y="178" width="98" height="14" rx="3" fill="#0c4a6e" stroke="#0284c7" stroke-width="0.5"/>
  <text class="lb d3" x="391" y="188" text-anchor="middle" fill="#7dd3fc">agent · active</text>

  <text class="lt d3" x="234" y="208">sysmon · auditd · osquery</text>
  <text class="lt d3" x="234" y="222">file integrity monitoring</text>
  <text class="lt d3" x="234" y="236">process · network · auth logs</text>

  <!-- ══ SIEM ZONE ══ -->
  <rect class="d1" x="472" y="44" width="184" height="210" rx="8" fill="#030f0a" stroke="#14532d" stroke-width="0.8"/>
  <text class="st d1" x="484" y="60" fill="#15803d">SOC CORE</text>

  <rect class="d2" x="484" y="68" width="158" height="92" rx="6" fill="#041a0e" stroke="#16a34a" stroke-width="0.8"/>
  <rect class="glow" x="484" y="68" width="158" height="92" rx="6" fill="#16a34a"/>
  <circle class="dot"  cx="500" cy="84" r="3.5" fill="#22c55e"/>
  <circle class="dot2" cx="513" cy="84" r="3.5" fill="#4ade80"/>
  <circle class="dot3" cx="526" cy="84" r="3.5" fill="#86efac"/>
  <text class="lm d2" x="500" y="108">Ubuntu Server</text>
  <text class="ls d2" x="500" y="122">Wazuh 4.x · XDR</text>
  <text class="ls d2" x="500" y="136">192.168.1.100</text>
  <text class="ls d2" x="500" y="150">wazuh-manager</text>

  <text class="lt d3" x="484" y="180">SIEM · IDS · FIM · SCA</text>
  <text class="lt d3" x="484" y="194">threat intel · vuln detect</text>
  <text class="lt d3" x="484" y="208">MITRE ATT&amp;CK mapping</text>
  <text class="lt d3" x="484" y="222">custom rules + decoders</text>

  <rect class="d3" x="484" y="228" width="80" height="14" rx="3" fill="#14532d" stroke="#22c55e" stroke-width="0.5"/>
  <text class="lb dot d3" x="524" y="238" text-anchor="middle" fill="#4ade80">● ACTIVE</text>

  <!-- ══ SWITCH ══ -->
  <rect class="d4" x="260" y="278" width="160" height="44" rx="6" fill="#111827" stroke="#374151" stroke-width="0.8"/>
  <text class="lm d4" x="340" y="297" text-anchor="middle">Network Switch</text>
  <text class="ls d4" x="340" y="311" text-anchor="middle">vlan · 192.168.1.0/24</text>
  <!-- port LEDs -->
  <rect x="274" y="306" width="7" height="4" rx="1" fill="#22c55e" opacity="0.9"/>
  <rect x="284" y="306" width="7" height="4" rx="1" fill="#22c55e" opacity="0.9"/>
  <rect x="294" y="306" width="7" height="4" rx="1" fill="#3b82f6" opacity="0.9"/>
  <rect x="304" y="306" width="7" height="4" rx="1" fill="#3b82f6" opacity="0.9"/>
  <rect x="370" y="306" width="7" height="4" rx="1" fill="#22c55e" opacity="0.9"/>
  <rect x="380" y="306" width="7" height="4" rx="1" fill="#f59e0b" opacity="0.9"/>

  <!-- ══ FLOW LINES ══ -->
  <!-- Kali → Switch -->
  <path class="fl d4" d="M 117 254 L 117 300 L 260 300" fill="none" stroke="#ef4444" stroke-width="1.2" marker-end="url(#arr)"/>
  <text class="lt d4" x="50" y="282" fill="#ef4444">attack</text>
  <text class="lt d4" x="50" y="294" fill="#ef4444">traffic</text>

  <!-- Victims → Switch -->
  <path class="fls d4" d="M 283 152 L 283 278" fill="none" stroke="#3b82f6" stroke-width="1" marker-end="url(#arr)"/>
  <path class="fls d4" d="M 391 152 L 391 278" fill="none" stroke="#3b82f6" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Switch → Wazuh -->
  <path class="fls d5" d="M 420 300 L 484 300 L 484 160" fill="none" stroke="#22c55e" stroke-width="1.2" marker-end="url(#arr)"/>
  <text class="lt d5" x="428" y="294" fill="#22c55e">logs /</text>
  <text class="lt d5" x="428" y="306" fill="#22c55e">events</text>

  <!-- ══ DETECTION PIPELINE ══ -->
  <rect class="d5" x="30" y="336" width="620" height="158" rx="8" fill="#080810" stroke="#312e81" stroke-width="0.8"/>
  <text class="st d5" x="42" y="354" fill="#4338ca">DETECTION &amp; ANALYSIS PIPELINE</text>

  <!-- Step 1 -->
  <rect class="d5" x="42" y="362" width="108" height="118" rx="5" fill="#0f0e20" stroke="#4f46e5" stroke-width="0.7"/>
  <text class="lm d5" x="96" y="382" text-anchor="middle" fill="#a5b4fc">01 · Ingest</text>
  <line x1="56" y1="390" x2="136" y2="390" stroke="#4f46e5" stroke-width="0.4" opacity="0.5"/>
  <text class="lt d5" x="50" y="406">wazuh agents</text>
  <text class="lt d5" x="50" y="420">syslog · beats</text>
  <text class="lt d5" x="50" y="434">auditd · sysmon</text>
  <text class="lt d5" x="50" y="448">windows events</text>
  <text class="lt d5" x="50" y="462">network flows</text>

  <path class="fl d5" d="M 150 420 L 166 420" fill="none" stroke="#4f46e5" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Step 2 -->
  <rect class="d5" x="168" y="362" width="108" height="118" rx="5" fill="#0f0e20" stroke="#4f46e5" stroke-width="0.7"/>
  <text class="lm d5" x="222" y="382" text-anchor="middle" fill="#a5b4fc">02 · Detect</text>
  <line x1="182" y1="390" x2="262" y2="390" stroke="#4f46e5" stroke-width="0.4" opacity="0.5"/>
  <text class="lt d5" x="176" y="406">rule matching</text>
  <text class="lt d5" x="176" y="420">custom decoders</text>
  <text class="lt d5" x="176" y="434">MITRE mapping</text>
  <text class="lt d5" x="176" y="448">anomaly detect</text>
  <text class="lt d5" x="176" y="462">sigma rules</text>

  <path class="fl d5" d="M 276 420 L 292 420" fill="none" stroke="#4f46e5" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Step 3 -->
  <rect class="d5" x="294" y="362" width="108" height="118" rx="5" fill="#0f0e20" stroke="#4f46e5" stroke-width="0.7"/>
  <text class="lm d5" x="348" y="382" text-anchor="middle" fill="#a5b4fc">03 · Triage</text>
  <line x1="308" y1="390" x2="388" y2="390" stroke="#4f46e5" stroke-width="0.4" opacity="0.5"/>
  <text class="lt d5" x="302" y="406">severity levels</text>
  <text class="lt d5" x="302" y="420">FP tuning</text>
  <text class="lt d5" x="302" y="434">TTP analysis</text>
  <text class="lt d5" x="302" y="448">IOC correlation</text>
  <text class="lt d5" x="302" y="462">timeline build</text>

  <path class="fl d5" d="M 402 420 L 418 420" fill="none" stroke="#4f46e5" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Step 4 -->
  <rect class="d5" x="420" y="362" width="108" height="118" rx="5" fill="#0f0e20" stroke="#4f46e5" stroke-width="0.7"/>
  <text class="lm d5" x="474" y="382" text-anchor="middle" fill="#a5b4fc">04 · Hunt</text>
  <line x1="434" y1="390" x2="514" y2="390" stroke="#4f46e5" stroke-width="0.4" opacity="0.5"/>
  <text class="lt d5" x="428" y="406">KQL queries</text>
  <text class="lt d5" x="428" y="420">IOC hunting</text>
  <text class="lt d5" x="428" y="434">pivot analysis</text>
  <text class="lt d5" x="428" y="448">lateral movement</text>
  <text class="lt d5" x="428" y="462">persistence check</text>

  <path class="fl d5" d="M 528 420 L 544 420" fill="none" stroke="#22c55e" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Step 5 -->
  <rect class="d5" x="546" y="362" width="90" height="118" rx="5" fill="#041a0e" stroke="#16a34a" stroke-width="0.8"/>
  <text class="lm d5" x="591" y="382" text-anchor="middle" fill="#4ade80">05 · Doc</text>
  <line x1="560" y1="390" x2="622" y2="390" stroke="#16a34a" stroke-width="0.4" opacity="0.5"/>
  <text class="lt d5" x="554" y="406">write-up</text>
  <text class="lt d5" x="554" y="420">screenshots</text>
  <text class="lt d5" x="554" y="434">MITRE tag</text>
  <rect class="dot d5" x="554" y="442" width="68" height="14" rx="3" fill="#14532d" stroke="#22c55e" stroke-width="0.5"/>
  <text class="lb d5" x="588" y="452" text-anchor="middle" fill="#86efac">→ GitHub</text>
  <text class="lt d5" x="554" y="472">published</text>
</svg>
